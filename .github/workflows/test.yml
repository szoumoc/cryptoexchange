name: Matching Engine Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Go Tests
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go 1.26.4
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Verify Go Version
        run: go version

      - name: Run Unit Tests
        run: go test -v ./...